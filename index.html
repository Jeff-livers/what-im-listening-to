<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>See What I'm Listeneing To</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Roboto Mono', monospace;
      font-size: 16px;
      line-height: 1.6;
      background: #ffffff;
      color: #000000;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 64px 40px 100px;
    }

    h1 {
      font-size: 64px;
      font-weight: 400;
      text-align: center;
      margin-bottom: 64px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 40px;
      max-width: 800px;
      margin: 0 auto;
    }

    .card {
      background: #2BCEBE;
      border: 5px solid #000000;
      border-radius: 21px;
      box-shadow: 20px 20px 0 0 #000;
      padding: 40px;
      max-height: 280px;
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 32px;
      align-items: center;
    }

    .card-art img {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border: 4px solid #000000;
      border-radius: 14px;
      display: block;
    }

    .card-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-title {
      font-size: 28px;
      font-weight: 400;
    }

    .card-artist {
      font-size: 20px;
      font-weight: 300;
      font-style: italic;
    }

    .card-listen {
      display: inline-block;
      margin-top: 12px;
      background: #ffffff;
      color: #000000;
      border: 2px solid #000000;
      border-radius: 10px;
      font-family: 'Roboto Mono', monospace;
      font-size: 16px;
      padding: 10px 40px;
      text-decoration: none;
      align-self: flex-start;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 36px;
      }

      .card {
        grid-template-columns: 1fr;
        text-align: left;
        max-height: none;
        padding: 20px;
      }

      .card-art img {
        width: 100%;
        height: auto;
        aspect-ratio: 1 / 1;
        border-radius: 14px;
      }

      .card-title {
        font-size: 22px;
      }

      .card-artist {
        font-size: 16px;
      }

      .card-listen {
        align-self: flex-start;
      }
    }

  </style>
</head>
<body>

  <div class="page">
    <h1>See What I'm Listening To</h1>
    <div class="cards" id="cards"></div>
  </div>

  <script>
    fetch('albums.json')
      .then(res => res.json())
      .then(albums => {
        const container = document.getElementById('cards');
        const colors = ['#2BCEBF', '#FFDA3E', '#FF00EB'];
        const lightText = ['#FF00EB'];
        albums.reverse().forEach((album, i) => {
          const bg = colors[i % colors.length];
          const textColor = lightText.includes(bg) ? '#ffffff' : '#000000';
          const card = document.createElement('div');
          card.className = 'card';
          card.style.background = bg;
          card.style.color = textColor;
          card.innerHTML = `
            <div class="card-art">
              <img src="${album.cover}" alt="${album.title}" />
            </div>
            <div class="card-info">
              <div class="card-title">${album.title}</div>
              <div class="card-artist">${album.artist}</div>
              <a class="card-listen" href="${album.link}" target="_blank" rel="noopener">Listen</a>
            </div>
          `;
          container.appendChild(card);
        });
      });
  </script>

</body>
</html>
